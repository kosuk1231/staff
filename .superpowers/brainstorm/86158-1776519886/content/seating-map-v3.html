<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a1616;

    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  h2 { text-align:center; color:#91c9c0; font-size:20px; margin-bottom:4px; }
  .subtitle { text-align:center; color:#8a9e9b; font-size:13px; margin-bottom:20px; }
  .stage {
    background:linear-gradient(135deg,#162828,#1e3a3a);
    border:1px solid rgba(145,201,192,0.3);
    border-radius:10px;
    text-align:center;
    padding:10px;
    font-size:13px; font-weight:700; color:#91c9c0; letter-spacing:3px;
    margin-bottom:28px;
  }
  .table-row { display:flex; justify-content:center; gap:6px; margin-bottom:8px; flex-wrap:wrap; align-items:center; }
  .table-wrap {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; transition:transform 0.15s;
  }
  .table-wrap:hover { transform:scale(1.06); }
  .legend {
    display:flex; justify-content:center; gap:20px;
    margin-top:20px; flex-wrap:wrap;
  }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:#8a9e9b; }
  .legend-dot { width:11px; height:11px; border-radius:50%; border:2px solid; }
  .note {
    text-align:center; font-size:12px; color:#506664;
    margin-top:14px; padding:12px;
    border:1px dashed rgba(145,201,192,0.15); border-radius:8px;
